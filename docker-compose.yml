services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql+psycopg2://dbuser:db-password@db_service:5432/mydb
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    depends_on:
      - db_service
      - redis
      - kafka

    # Lets containers reach services on the host (e.g. Docker Model Runner on :12434).
    extra_hosts:
      - "host.docker.internal:host-gateway"

    env_file:
      - .env

    # Live code from the host (compose run / up). Without this, /app is only what was COPY'd at build time.
    volumes:
      - ./backend/src:/app
      - ./backend/data:/app/data

    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

    develop:
      watch:
        - action: rebuild
          path: ./backend/requirements.txt

        - action: rebuild
          path: ./backend/dockerfile

        - action: sync
          path: ./backend/src
          target: /app

  db_service:
    image: postgres:17.5

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: db-password
      POSTGRES_DB: mydb

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"

    command: redis-server --save "" --appendonly no

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  celery-worker:
    build:
      context: ./backend
      dockerfile: dockerfile

    command: celery -A celery_app worker --loglevel=info --concurrency=4

    environment:
      DATABASE_URL: postgresql+psycopg2://dbuser:db-password@db_service:5432/mydb
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    depends_on:
      - db_service
      - redis
      - kafka

    env_file:
      - .env

    volumes:
      - ./backend/src:/app
      - ./backend/data:/app/data

  celery-beat:
    build:
      context: ./backend
      dockerfile: dockerfile

    command: celery -A celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule

    environment:
      DATABASE_URL: postgresql+psycopg2://dbuser:db-password@db_service:5432/mydb
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    depends_on:
      - db_service
      - redis
      - kafka

    env_file:
      - .env

    volumes:
      - ./backend/src:/app
      - ./backend/data:/app/data

  blog-worker:
    build:
      context: ./backend
      dockerfile: dockerfile

    command: python -m workers.blog_task_consumer

    environment:
      DATABASE_URL: postgresql+psycopg2://dbuser:db-password@db_service:5432/mydb
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    depends_on:
      - db_service
      - redis
      - kafka

    env_file:
      - .env

    volumes:
      - ./backend/src:/app
      - ./backend/data:/app/data

volumes:
  postgres_data:
