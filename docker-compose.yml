services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql+psycopg2://dbuser:db-password@db_service:5432/mydb

    depends_on:
      - db_service

    # Lets containers reach services on the host (e.g. Docker Model Runner on :12434).
    extra_hosts:
      - "host.docker.internal:host-gateway"

    env_file:
      - .env

    # Live code from the host (compose run / up). Without this, /app is only what was COPY'd at build time.
    volumes:
      - ./backend/src:/app

    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

    develop:
      watch:
        - action: rebuild
          path: ./backend/requirements.txt

        - action: rebuild
          path: ./backend/dockerfile

        - action: sync
          path: ./backend/src
          target: /app

  db_service:
    image: postgres:17.5

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: db-password
      POSTGRES_DB: mydb

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: